<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตัดสินใจเลย! (Decision Maker PRO)</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* --- Color Themes --- */
  :root {
    --bg-dark: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.6);
    --card-hover: rgba(51, 65, 85, 0.8);
    --primary: #8b5cf6;
    --primary-hover: #7c3aed;
    --secondary: #ec4899;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --danger: #ef4444;
    --border: rgba(255, 255, 255, 0.1);
    --input-bg: rgba(0,0,0,0.2);
    --glow: 0 0 20px rgba(139, 92, 246, 0.4);
    --glass-blur: blur(12px);
    --bg-pattern: radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                  radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15), transparent 25%);
  }

  [data-theme="light"] {
    --bg-dark: #f8fafc;
    --card-bg: rgba(255, 255, 255, 0.7);
    --card-hover: rgba(255, 255, 255, 1);
    --primary: #6366f1;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: rgba(0, 0, 0, 0.08);
    --input-bg: rgba(255,255,255,0.8);
    --bg-pattern: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.1), transparent 25%),
                  radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.1), transparent 25%);
  }

  [data-theme="gradient"] {
    --bg-dark: linear-gradient(135deg, #1e1b4b, #4c1d95, #701a75);
    --card-bg: rgba(255, 255, 255, 0.05);
    --card-hover: rgba(255, 255, 255, 0.1);
    --border: rgba(255, 255, 255, 0.15);
    --bg-pattern: none;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-dark);
    background-image: var(--bg-pattern);
    color: var(--text-main);
    font-family: 'Prompt', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    transition: background 0.5s ease;
  }

  .app-wrapper {
    display: flex;
    gap: 24px;
    max-width: 1100px;
    width: 100%;
    padding: 40px 20px 140px;
    flex-wrap: wrap;
    position: relative;
  }

  .main-content { flex: 1; min-width: 320px; max-width: 700px; }
  .sidebar { width: 320px; flex-shrink: 0; }

  @media (max-width: 860px) { .sidebar { width: 100%; } }

  /* Settings Dropdown */
  .settings-wrapper {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 60;
  }
  .btn-settings {
    background: var(--card-bg); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border); color: var(--text-main);
    width: 44px; height: 44px; border-radius: 50%;
    font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-settings:hover { transform: rotate(45deg); border-color: var(--primary); }
  
  .settings-menu {
    position: absolute; right: 0; top: 54px;
    background: var(--card-bg); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; width: 220px;
    opacity: 0; pointer-events: none; transform: translateY(-10px);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }
  .settings-menu.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .settings-menu h4 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; }
  
  .theme-options { display: flex; gap: 8px; margin-bottom: 16px; }
  .theme-btn {
    flex: 1; padding: 8px 0; border: 1px solid var(--border);
    background: var(--input-bg); color: var(--text-main);
    border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .theme-btn:hover { border-color: var(--primary); }
  .theme-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Header */
  header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
  header h1 {
    font-size: clamp(2.5rem, 6vw, 3.5rem); font-weight: 700; line-height: 1.1;
    background: linear-gradient(to right, #a78bfa, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  header p { color: var(--text-muted); font-size: 1.1rem; }

  /* Input Section */
  .input-group { display: flex; gap: 12px; margin-bottom: 30px; }
  .input-group input {
    flex: 1; background: var(--card-bg); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border); color: var(--text-main);
    font-family: 'Prompt', sans-serif; font-size: 1.1rem;
    padding: 16px 24px; border-radius: 20px; outline: none; transition: all 0.3s ease;
  }
  .input-group input:focus { border-color: var(--primary); box-shadow: var(--glow); }
  .btn-add {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white; border: none; width: 60px; border-radius: 20px;
    font-size: 1.5rem; cursor: pointer; transition: all 0.2s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add:hover { transform: translateY(-2px); box-shadow: var(--glow); }
  .btn-add:active { transform: translateY(0); }

  /* List Header */
  .list-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding: 0 8px;
  }
  .list-header h2 { font-size: 1.1rem; font-weight: 500; display: flex; align-items: center; gap: 8px; color: var(--text-muted); }
  .badge { background: rgba(139, 92, 246, 0.2); padding: 2px 10px; border-radius: 20px; font-size: 0.9rem; color: var(--primary); }

  /* Choices List */
  .choices-list { display: flex; flex-direction: column; gap: 12px; }
  
  .choice-card {
    background: var(--card-bg); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border); border-radius: 20px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer; overflow: hidden;
    animation: slideIn 0.3s ease forwards;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .choice-card.removing { transform: translateX(50px); opacity: 0; pointer-events: none; }
  .choice-card:hover { background: var(--card-hover); border-color: var(--primary); }
  .choice-card.selected { border-color: var(--primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); background: rgba(139, 92, 246, 0.1); }
  .choice-card.spinning { border-color: var(--secondary); background: rgba(236, 72, 153, 0.15); transform: scale(1.02); }

  .card-main { display: flex; align-items: center; padding: 16px 20px; gap: 16px; }
  
  .radio-circle {
    width: 22px; height: 22px; border: 2px solid var(--text-muted); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .radio-inner {
    width: 10px; height: 10px; background: var(--primary); border-radius: 50%;
    transform: scale(0); transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .choice-card.selected .radio-circle { border-color: var(--primary); }
  .choice-card.selected .radio-inner { transform: scale(1); }

  .choice-title { flex: 1; font-size: 1.1rem; font-weight: 500; display: flex; flex-direction: column; gap: 4px; }
  .choice-meta { display: flex; gap: 8px; font-size: 0.85rem; color: var(--text-muted); font-weight: 300; flex-wrap: wrap; }
  .meta-tag { background: rgba(139, 92, 246, 0.1); padding: 2px 8px; border-radius: 12px; border: 1px solid rgba(139, 92, 246, 0.2); }
  
  .card-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: rgba(255,255,255,0.05); border: none; color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
  .btn-icon.danger:hover { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
  
  /* Details Section */
  .card-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out; }
  .card-detail.open { max-height: 250px; }
  .detail-inner { padding: 0 20px 16px 58px; display: flex; flex-direction: column; gap: 10px; }
  .detail-inputs { display: flex; gap: 10px; flex-wrap: wrap; }
  .detail-inputs input {
    background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main);
    padding: 10px 12px; border-radius: 10px; font-family: inherit; font-size: 0.9rem; outline: none;
  }
  .detail-inputs input:focus { border-color: var(--primary); }
  .input-tags { flex: 2; min-width: 120px; }
  .input-weight { flex: 1; min-width: 80px; }
  .card-detail textarea {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text-main); font-family: inherit; padding: 12px; border-radius: 10px;
    resize: none; height: 60px; outline: none; font-size: 0.9rem;
  }
  .card-detail textarea:focus { border-color: var(--primary); }

  /* Empty State */
  .empty-state {
    text-align: center; padding: 60px 20px; background: rgba(255,255,255,0.02);
    border: 2px dashed var(--border); border-radius: 20px; color: var(--text-muted);
  }

  /* Sidebar */
  .panel {
    background: var(--card-bg); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px;
  }
  .panel h3 { font-size: 1rem; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  
  .history-list { display: flex; flex-direction: column; gap: 12px; max-height: 350px; overflow-y: auto; padding-right: 4px; }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.4); border-radius: 10px; }
  
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 12px; font-size: 0.9rem; transition: transform 0.2s;
  }
  .history-item:hover { transform: translateX(2px); border-color: rgba(255,255,255,0.1); }
  .history-info { display: flex; flex-direction: column; }
  .history-title { font-weight: 500; color: var(--text-main); }
  .history-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
  .btn-clear-history {
    width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--border);
    color: var(--text-muted); border-radius: 12px; margin-top: 16px; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-clear-history:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: var(--danger); }

  /* Bottom Actions */
  .action-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.1); padding: 16px 20px; z-index: 50; display: flex; justify-content: center;
  }
  
  /* ปรับธีม Action Bar ตาม Theme (เฉพาะตอนเป็น Light) */
  [data-theme="light"] .action-bar { background: rgba(255, 255, 255, 0.9); border-top-color: rgba(0,0,0,0.1); }

  .action-inner { display: flex; gap: 12px; max-width: 1100px; width: 100%; flex-wrap: wrap; justify-content: center; }
  .btn-main {
    flex: 1; min-width: 160px; padding: 16px 20px; border-radius: 16px; font-family: inherit; font-size: 1rem;
    font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-slot { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.2); }
  .btn-slot:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(236, 72, 153, 0.4); }
  
  .btn-weight { background: rgba(139, 92, 246, 0.15); color: var(--primary); border-color: rgba(139, 92, 246, 0.3); }
  .btn-weight:hover { background: rgba(139, 92, 246, 0.25); transform: translateY(-3px); }

  .btn-confirm { background: var(--text-main); color: var(--bg-dark); }
  .btn-confirm:hover { opacity: 0.9; transform: translateY(-3px); }
  .btn-confirm:disabled { background: var(--input-bg); color: var(--text-muted); cursor: not-allowed; transform: none; opacity: 0.5; }
  
  .btn-clear-all { background: transparent; color: var(--text-muted); border-color: var(--border); flex-grow: 0; min-width: auto; padding: 16px; }
  .btn-clear-all:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }

  @media (max-width: 600px) {
    .btn-main { min-width: 130px; padding: 12px 16px; font-size: 0.9rem; }
    .btn-clear-all { min-width: 100%; }
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; text-align: center;
    transform: scale(0.9) translateY(30px); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; overflow: hidden;
  }
  .modal-overlay.show .modal { transform: scale(1) translateY(0); }
  .modal-icon { font-size: 5rem; margin-bottom: 20px; animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
  
  .modal h3 { color: var(--text-muted); font-weight: 500; margin-bottom: 8px; letter-spacing: 1px; }
  .modal h2 { font-size: 2.2rem; color: var(--text-main); margin-bottom: 24px; line-height: 1.2; word-break: break-word; }
  .modal-btn {
    width: 100%; padding: 16px; border-radius: 16px; font-family: inherit; font-size: 1.1rem;
    font-weight: 600; cursor: pointer; border: none; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white;
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); transition: all 0.2s;
  }
  .modal-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.5); }

  /* Confetti Elements */
  .confetti {
    position: absolute; width: 10px; height: 10px; background: #f00; opacity: 0;
  }
  @keyframes fall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(200px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body data-theme="dark">

<div class="app-wrapper">

  <div class="settings-wrapper">
    <button class="btn-settings" id="settingsBtn" title="ตั้งค่า">⚙️</button>
    <div class="settings-menu" id="settingsMenu">
      <h4>🎨 เลือกธีมสี</h4>
      <div class="theme-options">
        <button class="theme-btn active" data-set-theme="dark">Dark</button>
        <button class="theme-btn" data-set-theme="light">Light</button>
        <button class="theme-btn" data-set-theme="gradient">Glow</button>
      </div>
    </div>
  </div>
  
  <div class="main-content">
    <header>
      <h1>ตัดสินใจเลย!</h1>
      <p>โยนความลังเลทิ้งไป... ปล่อยให้เราช่วยคุณเลือก!</p>
    </header>

    <div class="input-group">
      <input type="text" id="choiceInput" placeholder="พิมพ์ตัวเลือกที่นี่ เช่น ชาบู, สุกี้, วิ่งสวนสาธารณะ..." maxlength="100" autocomplete="off">
      <button class="btn-add" id="addBtn" title="เพิ่มตัวเลือก">+</button>
    </div>

    <div class="list-header">
      <h2>ตัวเลือกทั้งหมด <span class="badge" id="countBadge">0</span></h2>
      <span style="font-size: 0.9rem; color: var(--text-muted);">น้ำหนักรวม: <span id="weightBadge">0</span></span>
    </div>

    <div class="choices-list" id="choicesList">
      <div class="empty-state" id="emptyState">
        <div class="icon" style="font-size: 3.5rem; margin-bottom: 10px; opacity: 0.8;">🤔</div>
        <p>ยังไม่มีตัวเลือก พิมพ์แล้วกดบวกเลย!</p>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="panel">
      <h3>📊 ประวัติการตัดสินใจ</h3>
      <div class="history-list" id="historyList"></div>
      <button class="btn-clear-history" id="clearHistoryBtn">ล้างประวัติทั้งหมด</button>
    </div>
  </aside>

</div>

<div class="action-bar">
  <div class="action-inner">
    <button class="btn-main btn-slot" id="randomBtn">🎰 สุ่มแบบปกติ</button>
    <button class="btn-main btn-weight" id="randomWeightBtn">⚖️ สุ่มตามน้ำหนัก</button>
    <button class="btn-main btn-confirm" id="confirmBtn" disabled>✔️ ยืนยันเลย</button>
    <button class="btn-main btn-clear-all" id="clearBtn" title="ล้างรายการทั้งหมด">✕ ล้างทั้งหมด</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-icon" id="modalIcon">🎉</div>
    <h3 id="modalSubtitle">ผลการตัดสินใจ</h3>
    <h2 id="modalTitle">ชาบู</h2>
    <button class="modal-btn" id="closeModalBtn">เยี่ยมไปเลย!</button>
  </div>
</div>

<script>
  // State Initialization
  let choices = JSON.parse(localStorage.getItem('dm_choices')) || [];
  let decisionHistory = JSON.parse(localStorage.getItem('dm_history')) || [];
  let currentTheme = localStorage.getItem('dm_theme') || 'dark';
  
  let selectedId = null;
  let isSpinning = false;

  const elements = {
    input: document.getElementById('choiceInput'),
    addBtn: document.getElementById('addBtn'),
    list: document.getElementById('choicesList'),
    emptyState: document.getElementById('emptyState'),
    countBadge: document.getElementById('countBadge'),
    weightBadge: document.getElementById('weightBadge'),
    randomBtn: document.getElementById('randomBtn'),
    randomWeightBtn: document.getElementById('randomWeightBtn'),
    confirmBtn: document.getElementById('confirmBtn'),
    clearBtn: document.getElementById('clearBtn'),
    historyList: document.getElementById('historyList'),
    clearHistoryBtn: document.getElementById('clearHistoryBtn'),
    modal: document.getElementById('modalOverlay'),
    modalBox: document.getElementById('modalBox'),
    modalTitle: document.getElementById('modalTitle'),
    modalIcon: document.getElementById('modalIcon'),
    modalSubtitle: document.getElementById('modalSubtitle'),
    closeModalBtn: document.getElementById('closeModalBtn'),
    settingsBtn: document.getElementById('settingsBtn'),
    settingsMenu: document.getElementById('settingsMenu'),
  };

  // --- Theme Logic ---
  function applyTheme(theme) {
    document.body.setAttribute('data-theme', theme);
    localStorage.setItem('dm_theme', theme);
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.setTheme === theme);
    });
  }
  applyTheme(currentTheme);

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', (e) => applyTheme(e.target.dataset.setTheme));
  });

  elements.settingsBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    elements.settingsMenu.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.settings-wrapper')) elements.settingsMenu.classList.remove('open');
  });

  // --- Core Logic ---
  function saveData() {
    localStorage.setItem('dm_choices', JSON.stringify(choices));
    localStorage.setItem('dm_history', JSON.stringify(decisionHistory));
  }

  function generateId() { return Math.random().toString(36).substr(2, 9); }
  function escapeHtml(str) { return String(str).replace(/[&<>'"]/g, match => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[match])); }

  function renderHistory() {
    elements.historyList.innerHTML = '';
    if (decisionHistory.length === 0) {
      elements.historyList.innerHTML = '<div style="text-align:center; padding: 30px 10px; color: var(--text-muted); font-size: 0.9rem;">ยังไม่มีประวัติการสุ่ม<br>ลองกดปุ่มด้านล่างสิ!</div>';
      return;
    }
    
    [...decisionHistory].reverse().forEach(item => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <div class="history-info">
          <span class="history-title">🎯 ${escapeHtml(item.title)}</span>
          <span class="history-date">${item.date}</span>
        </div>
      `;
      elements.historyList.appendChild(div);
    });
  }

  function render() {
    const cards = elements.list.querySelectorAll('.choice-card');
    cards.forEach(card => card.remove());

    let totalWeight = 0;
    elements.countBadge.textContent = choices.length;
    elements.emptyState.style.display = choices.length === 0 ? 'block' : 'none';
    elements.confirmBtn.disabled = !selectedId || choices.length === 0;

    choices.forEach((choice) => {
      totalWeight += Number(choice.weight) || 1;
      const card = document.createElement('div');
      card.className = `choice-card ${choice.id === selectedId ? 'selected' : ''}`;
      card.id = `card-${choice.id}`;
      
      let tagsHtml = '';
      if(choice.tags && choice.tags.trim() !== '') {
        const tagsArray = choice.tags.split(',').map(t => t.trim()).filter(t => t);
        tagsHtml = tagsArray.map(t => `<span class="meta-tag">🏷️ ${escapeHtml(t)}</span>`).join('');
      }

      card.innerHTML = `
        <div class="card-main">
          <div class="radio-circle"><div class="radio-inner"></div></div>
          <div class="choice-title">
            <span>${escapeHtml(choice.title)}</span>
            <div class="choice-meta">
              ${tagsHtml}
              <span class="meta-tag">⚖️ น้ำหนัก: ${choice.weight || 1}</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-icon btn-expand" title="ตั้งค่า/รายละเอียด">✏️</button>
            <button class="btn-icon danger btn-delete" title="ลบ">🗑️</button>
          </div>
        </div>
        <div class="card-detail ${choice.showDetail ? 'open' : ''}">
          <div class="detail-inner">
            <div class="detail-inputs">
              <input type="text" class="input-tags" placeholder="แท็ก (เช่น ด่วน, มื้อเย็น คั่นด้วยลูกน้ำ)" value="${escapeHtml(choice.tags || '')}">
              <input type="number" class="input-weight" placeholder="น้ำหนัก 1-100" min="1" max="1000" value="${choice.weight || 1}">
            </div>
            <textarea placeholder="เพิ่มรายละเอียดอื่นๆ...">${escapeHtml(choice.detail || '')}</textarea>
          </div>
        </div>
      `;

      // Select
      card.querySelector('.card-main').addEventListener('click', (e) => {
        if(e.target.closest('.card-actions')) return;
        selectedId = choice.id;
        render();
      });

      // Expand
      card.querySelector('.btn-expand').addEventListener('click', () => {
        choice.showDetail = !choice.showDetail;
        render(); saveData();
      });

      // Delete (With smooth animation)
      card.querySelector('.btn-delete').addEventListener('click', () => {
        card.classList.add('removing');
        setTimeout(() => {
          choices = choices.filter(c => c.id !== choice.id);
          if(selectedId === choice.id) selectedId = null;
          render(); saveData();
        }, 300); // Wait for transition
      });

      // Inputs
      card.querySelector('.input-tags').addEventListener('input', (e) => { choice.tags = e.target.value; saveData(); });
      card.querySelector('.input-weight').addEventListener('change', (e) => { choice.weight = Number(e.target.value) || 1; render(); saveData(); });
      card.querySelector('textarea').addEventListener('input', (e) => { choice.detail = e.target.value; saveData(); });

      elements.list.appendChild(card);
    });

    elements.weightBadge.textContent = totalWeight;
    renderHistory();
  }

  function addChoice() {
    const text = elements.input.value.trim();
    if (!text) return;
    choices.push({ id: generateId(), title: text, detail: '', tags: '', weight: 1, showDetail: false });
    elements.input.value = '';
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
    render(); saveData();
  }

  function saveToHistory(title) {
    const now = new Date();
    const dateStr = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });
    decisionHistory.push({ title, date: dateStr });
    if(decisionHistory.length > 30) decisionHistory.shift(); 
    saveData();
    renderHistory();
  }

  // --- Confetti Effect ---
  function createConfetti() {
    const colors = ['#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#3b82f6'];
    for(let i=0; i<30; i++) {
      const conf = document.createElement('div');
      conf.className = 'confetti';
      conf.style.left = Math.random() * 100 + '%';
      conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      conf.style.animation = `fall ${Math.random() * 1 + 1}s ease forwards`;
      elements.modalBox.appendChild(conf);
      setTimeout(() => conf.remove(), 2000);
    }
  }

  function showModal(choice, isRandom = false, type = '') {
    elements.modalTitle.textContent = choice.title;
    elements.modalSubtitle.textContent = isRandom ? `ระบบสุ่มให้คุณคือ... (${type})` : 'ตัวเลือกที่คุณตัดสินใจ...';
    elements.modalIcon.textContent = isRandom ? '🎰' : '🎯';
    elements.modal.classList.add('show');
    
    // Play confetti
    createConfetti();
    saveToHistory(choice.title);
  }

  function spinRoulette(weighted = false) {
    if (choices.length === 0 || isSpinning) return;
    if (choices.length === 1) {
      selectedId = choices[0].id; render(); showModal(choices[0], true, 'ตัวเลือกเดียว'); return;
    }

    isSpinning = true;
    elements.randomBtn.disabled = true;
    elements.randomWeightBtn.disabled = true;
    selectedId = null; render();
    
    // Scroll up slightly to see the spin
    window.scrollTo({ top: 0, behavior: 'smooth' });

    let spins = 0;
    const maxSpins = Math.floor(Math.random() * 10) + 25;
    let currentIndex = 0;
    let finalTargetIndex = 0;

    if(weighted) {
      const totalWeight = choices.reduce((sum, c) => sum + (Number(c.weight) || 1), 0);
      let randomVal = Math.random() * totalWeight;
      for(let i = 0; i < choices.length; i++) {
        randomVal -= (Number(choices[i].weight) || 1);
        if(randomVal <= 0) { finalTargetIndex = i; break; }
      }
    } else {
      finalTargetIndex = Math.floor(Math.random() * choices.length);
    }

    const spinInterval = () => {
      document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('spinning'));
      
      const activeCard = document.getElementById(`card-${choices[currentIndex].id}`);
      if(activeCard) activeCard.classList.add('spinning');

      spins++;
      
      if (spins < maxSpins || (spins >= maxSpins && currentIndex !== finalTargetIndex)) {
        currentIndex = (currentIndex + 1) % choices.length;
        const delay = Math.max(40, spins * 12); 
        setTimeout(spinInterval, delay);
      } else {
        isSpinning = false;
        elements.randomBtn.disabled = false;
        elements.randomWeightBtn.disabled = false;
        selectedId = choices[finalTargetIndex].id;
        render(); 
        setTimeout(() => showModal(choices[finalTargetIndex], true, weighted ? 'แบบถ่วงน้ำหนัก' : 'แบบปกติ'), 400);
      }
    };
    spinInterval();
  }

  // --- Event Listeners ---
  elements.addBtn.addEventListener('click', addChoice);
  elements.input.addEventListener('keypress', (e) => { if (e.key === 'Enter') addChoice(); });
  
  elements.clearBtn.addEventListener('click', () => {
    if(confirm('คุณต้องการล้าง "ตัวเลือกทั้งหมด" ใช่หรือไม่?')) { 
      choices = []; selectedId = null; render(); saveData(); 
    }
  });

  elements.clearHistoryBtn.addEventListener('click', () => {
    if(confirm('ต้องการลบประวัติการตัดสินใจทั้งหมด?')) { 
      decisionHistory = []; renderHistory(); saveData(); 
    }
  });

  elements.confirmBtn.addEventListener('click', () => {
    const choice = choices.find(c => c.id === selectedId);
    if(choice) showModal(choice, false);
  });

  elements.randomBtn.addEventListener('click', () => spinRoulette(false));
  elements.randomWeightBtn.addEventListener('click', () => spinRoulette(true));
  elements.closeModalBtn.addEventListener('click', () => elements.modal.classList.remove('show'));

  // Initialize App
  render();
</script>
</body>
</html>
